name: ingest

on:
  schedule:
    # ~05:15 and ~17:45 Oslo in summer (Actions cron is UTC and can jitter);
    # both land before the agent's 06:00 / 18:30 runs year-round.
    - cron: "15 3 * * *"
    - cron: "45 15 * * *"
  workflow_dispatch:

concurrency:
  group: ingest

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run ingest
      - run: npm run cleanup
      - name: commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data digests
          git diff --cached --quiet || git commit -m "chore(data): ingest run"
          git push
