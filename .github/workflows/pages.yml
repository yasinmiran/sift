name: pages

on:
  push:
    branches: [main]
    paths: ["digests/**", "data/slides/**", "public/**", "src/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run site
      - id: pw-version
        run: echo "v=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.v }}
      # The carousel is best-effort by design: a missing or broken slides
      # script must never block the digest deploy.
      - name: slides
        continue-on-error: true
        run: |
          npm run slides
          npx playwright install --with-deps chromium
          npm run slides:render
          mkdir -p site/slides
          cp -R slides/. site/slides/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # The Pages service intermittently rejects fresh deployments with a
      # generic "try again later"; a second attempt has always succeeded.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
